<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<title>AI Impact — Pre-Assessment</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');
:root{--purple-dark:#2D2D5E;--purple-mid:#534AB7;--purple-light:#EEEDFE;--purple-acc:#7F77DD;--green:#1D9E75;--green-light:#E1F5EE;--amber:#BA7517;--amber-light:#FAEEDA;--gray-bg:#F7F7F5;--gray-border:#E2E0F0;--text-primary:#1A1A2E;--text-sec:#6B6B8A;--white:#FFFFFF;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--gray-bg);color:var(--text-primary);min-height:100vh;padding:2rem 1rem;}
.container{max-width:720px;margin:0 auto;}
.header{background:var(--purple-dark);border-radius:16px 16px 0 0;padding:2rem 2rem 1.5rem;color:var(--white);}
.header-tag{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--purple-acc);margin-bottom:.5rem;}
.header h1{font-size:22px;font-weight:700;line-height:1.3;margin-bottom:.75rem;}
.header p{font-size:13px;color:rgba(255,255,255,.65);line-height:1.7;}
.progress-wrap{background:var(--white);padding:1rem 2rem;border-bottom:1px solid var(--gray-border);display:flex;align-items:center;gap:1rem;}
.progress-bar{flex:1;height:5px;background:var(--gray-border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width .4s ease;}
.progress-label{font-size:12px;color:var(--text-sec);white-space:nowrap;}
.card{background:var(--white);padding:1.75rem 2rem;border-bottom:1px solid var(--gray-border);}
.card-category{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--purple-mid);margin-bottom:.4rem;}
.card-question{font-size:16px;font-weight:500;line-height:1.6;margin-bottom:1.25rem;}
.options{display:flex;flex-direction:column;gap:8px;}
.option{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border:1.5px solid var(--gray-border);border-radius:10px;cursor:pointer;transition:all .15s;background:var(--white);}
.option:hover{border-color:var(--purple-acc);background:var(--purple-light);}
.option.selected{border-color:var(--purple-mid);background:var(--purple-light);}
.option-score{width:26px;height:26px;border-radius:50%;background:var(--gray-border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text-sec);flex-shrink:0;transition:all .15s;}
.option.selected .option-score{background:var(--purple-mid);color:var(--white);}
.option-body{display:flex;flex-direction:column;gap:4px;padding-top:3px;}
.option-text{font-size:13px;line-height:1.6;color:var(--text-primary);}
.option-hint{font-size:11px;color:var(--text-sec);line-height:1.5;font-style:italic;}
.option.selected .option-hint{color:#534AB7;}
.nav{background:var(--white);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--gray-border);}
.btn{padding:9px 22px;border-radius:8px;border:1.5px solid var(--gray-border);background:var(--white);color:var(--text-sec);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn:hover{border-color:var(--purple-acc);color:var(--purple-mid);}
.btn:disabled{opacity:.3;cursor:default;}
.btn.primary{background:var(--purple-mid);border-color:var(--purple-mid);color:var(--white);}
.btn.primary:hover{background:var(--purple-dark);}
.btn.primary:disabled{opacity:.4;cursor:default;}
.btn.green{background:var(--green);border-color:var(--green);color:var(--white);}
.btn.green:hover{background:#0F6E56;}
.btn.green:disabled{opacity:.4;cursor:default;}
.result-hero{background:var(--purple-dark);padding:2rem;color:var(--white);}
.result-tag{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--purple-acc);margin-bottom:.5rem;}
.result-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:.75rem;}
.result-avg{font-size:42px;font-weight:700;line-height:1;margin-bottom:.25rem;}
.result-body{background:var(--white);padding:1.75rem 2rem;}
.result-sec-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-sec);margin-bottom:1rem;}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem;}
.score-card{background:var(--gray-bg);border-radius:10px;padding:14px 16px;border:1px solid var(--gray-border);}
.score-card-label{font-size:11px;color:var(--text-sec);margin-bottom:4px;}
.score-card-value{font-size:17px;font-weight:700;color:var(--text-primary);}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-label{width:160px;font-size:11px;color:var(--text-sec);flex-shrink:0;}
.bar-track{flex:1;height:7px;background:var(--gray-border);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease;}
.bar-score{width:20px;font-size:12px;font-weight:700;color:var(--text-primary);text-align:right;}
.divider{border:none;border-top:1px solid var(--gray-border);margin:1.5rem 0;}
.note{font-size:12px;color:var(--text-sec);line-height:1.7;background:var(--purple-light);border-radius:10px;padding:14px 16px;margin-bottom:1.5rem;}
.submit-block{border:1px solid var(--gray-border);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;}
.submit-block-title{font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:12px;}
.name-input{width:100%;font-size:14px;padding:10px 12px;border:1.5px solid var(--gray-border);border-radius:8px;font-family:inherit;color:var(--text-primary);transition:border-color .15s;margin-bottom:10px;}
.name-input:focus{outline:none;border-color:var(--purple-mid);}
.submit-note{font-size:11px;color:var(--text-sec);margin-bottom:12px;line-height:1.6;}
.success-msg{background:var(--green-light);border:1px solid var(--green);border-radius:8px;padding:12px 16px;font-size:13px;color:#0F6E56;display:none;}
.footer{background:var(--purple-dark);border-radius:0 0 16px 16px;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;}
.footer-text{font-size:12px;color:rgba(255,255,255,.5);}
.print-btn{padding:8px 18px;border-radius:8px;border:1.5px solid rgba(255,255,255,.3);background:transparent;color:var(--white);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;}
.print-btn:hover{background:rgba(255,255,255,.1);}
@media print{body{background:white;padding:0;}.nav,.footer,.print-btn,.submit-block{display:none;}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-tag">AI Impact — Core Competency</div>
    <h1>Pre-Assessment</h1>
    <p>For each category, select the option that best describes your current behavior. Your results will serve as the baseline for your year-end evaluation.</p>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%;background:#534AB7"></div></div>
    <div class="progress-label" id="progress-label">0 / 8 completed</div>
  </div>
  <div id="quiz-area"></div>
  <div class="nav">
    <button class="btn" id="prev-btn" onclick="prev()" disabled>← Back</button>
    <button class="btn primary" id="next-btn" onclick="next()" disabled>Next →</button>
  </div>
  <div class="footer">
    <div class="footer-text">© MKI — AI Impact Assessment</div>
    <button class="print-btn" onclick="window.print()">🖨 Print / Save as PDF</button>
  </div>
</div>
<script>
const questions = [
  {
    "id": "q1",
    "category": "AI Usage Frequency",
    "text": "How actively are you using AI tools in your day-to-day work?",
    "options": [
      {
        "score": 1,
        "text": "I rarely use AI, or only when specifically instructed to do so.",
        "hint": "e.g., You might only try an AI tool when your manager or a colleague asks you to."
      },
      {
        "score": 2,
        "text": "I use AI occasionally in my own work, but not consistently.",
        "hint": "e.g., You might use AI from time to time for tasks such as drafting emails or doing quick research, but it hasn't become a regular habit yet."
      },
      {
        "score": 3,
        "text": "AI is a regular part of how I get my daily work done.",
        "hint": "e.g., You might routinely use AI when working on documents, summarizing meetings, translating content, or handling other everyday tasks—making it a consistent part of your workflow."
      },
      {
        "score": 4,
        "text": "I have extended AI use beyond my own team to other departments or teams.",
        "hint": "e.g., You might share your AI use cases with colleagues in other departments or teams, offer support when asked, or contribute in other ways to expanding AI adoption beyond your immediate team."
      },
      {
        "score": 5,
        "text": "I am actively involved in building systems or frameworks to advance AI adoption across the organization.",
        "hint": "e.g., You might proactively raise your hand to join initiatives aimed at expanding or embedding AI use organization-wide, contributing to the effort in whatever capacity fits your role."
      }
    ]
  },
  {
    "id": "q2",
    "category": "Knowledge Capture",
    "text": "How do you record and accumulate the know-how and insights you gain from using AI?",
    "options": [
      {
        "score": 1,
        "text": "I don't record them.",
        "hint": "e.g., Even when you find a useful prompt or technique, you might not write it down or save it anywhere."
      },
      {
        "score": 2,
        "text": "I occasionally save notes or files for my own personal use.",
        "hint": "e.g., You might keep useful prompts or tips in a personal folder, note-taking app, or similar tool for your own reference."
      },
      {
        "score": 3,
        "text": "I organize and document knowledge in a way that my team or department can refer to.",
        "hint": "e.g., You might create a shared prompt library, usage guide, or similar resource on a team drive or shared workspace so colleagues can easily access it."
      },
      {
        "score": 4,
        "text": "I have standardized knowledge into reusable formats that are being used across multiple departments or teams.",
        "hint": "e.g., You might develop prompt templates or how-to guides organized by task type that are now being used across multiple departments or teams."
      },
      {
        "score": 5,
        "text": "I actively contribute to building a system where knowledge is automatically captured and shared across the organization.",
        "hint": "e.g., You might be involved in building or improving a system—such as a knowledge base or shared repository—where AI use cases and effective prompts are continuously accumulated and made available organization-wide."
      }
    ]
  },
  {
    "id": "q3",
    "category": "Knowledge Sharing",
    "text": "To what extent do you share your AI know-how and learnings with others?",
    "options": [
      {
        "score": 1,
        "text": "I rarely share with others.",
        "hint": "e.g., You might not often pass along what you've learned about using AI, even when it could be helpful to others."
      },
      {
        "score": 2,
        "text": "I share when asked, but don't proactively reach out.",
        "hint": "e.g., If a colleague asks how you use AI, you might explain, but you don't typically bring it up on your own."
      },
      {
        "score": 3,
        "text": "I regularly share with my team through meetings, documentation, or informal channels.",
        "hint": "e.g., You might regularly share AI tips or use cases through team meetings, a shared channel, informal conversations, or similar touchpoints."
      },
      {
        "score": 4,
        "text": "I proactively share and roll out knowledge across other departments and teams.",
        "hint": "e.g., On your own initiative—not as part of your assigned responsibilities—you might share your AI experience with colleagues in other departments or teams and encourage them to apply similar approaches."
      },
      {
        "score": 5,
        "text": "I actively share and promote AI knowledge and outcomes across the Mitsui/MKI Group.",
        "hint": "e.g., You might share significant results, use cases, and lessons learned from your AI work at all-hands meetings, cross-location sessions, or similar forums, contributing to the broader spread of AI adoption across the Mitsui/MKI Group."
      }
    ]
  },
  {
    "id": "q4",
    "category": "Driving AI Adoption",
    "text": "What actions are you taking to help embed AI use in your workplace?",
    "options": [
      {
        "score": 1,
        "text": "I haven't taken any specific action toward this.",
        "hint": "e.g., You might use AI yourself, but haven't done anything intentional to encourage broader adoption among your colleagues."
      },
      {
        "score": 2,
        "text": "I occasionally spark interest in others by showing them what I've done with AI.",
        "hint": "e.g., You might show a colleague how you used AI for a task, or share a quick tip through chat or in passing."
      },
      {
        "score": 3,
        "text": "I contribute to building AI usage practices or guidelines within my team.",
        "hint": "e.g., You might put together a team prompt library, step-by-step usage guides, or similar resources and share them with your team."
      },
      {
        "score": 4,
        "text": "I actively support and roll out AI use to other departments and teams.",
        "hint": "e.g., When other departments or teams reach out about AI, you might draw on your own experience to actively support them—and follow up to make sure it sticks."
      },
      {
        "score": 5,
        "text": "I actively contribute to creating an environment where AI use grows and sustains itself across the organization.",
        "hint": "e.g., You might continuously support colleagues in building their AI skills through coaching, sharing, or other means—working toward a state where AI adoption continues on its own even without your direct involvement."
      }
    ]
  },
  {
    "id": "q5",
    "category": "Business Impact",
    "text": "How has AI use affected the quality and speed of work—for you and those around you?",
    "options": [
      {
        "score": 1,
        "text": "There has been little to no noticeable change.",
        "hint": "e.g., Your work might look about the same whether you use AI or not."
      },
      {
        "score": 2,
        "text": "My own work has become somewhat more efficient, but the impact beyond me is limited.",
        "hint": "e.g., You might be a little faster at certain tasks such as drafting documents or doing research, but it hasn't made a noticeable difference for your team or department yet."
      },
      {
        "score": 3,
        "text": "The quality and speed of work across my team has clearly improved.",
        "hint": "e.g., Your team's overall output time might have noticeably decreased thanks to AI, freeing everyone up to focus on higher-value work."
      },
      {
        "score": 4,
        "text": "AI use has led to process improvements and value gains across multiple departments or teams.",
        "hint": "e.g., By rolling out AI practices to other departments or teams, similar efficiency gains might have been realized more broadly, contributing to company-wide productivity."
      },
      {
        "score": 5,
        "text": "AI use has contributed to significant value creation for the organization or beyond.",
        "hint": "e.g., The results of your team's AI adoption might have translated into improved business performance and greater value delivery to customers, partners, or the organization as a whole."
      }
    ]
  },
  {
    "id": "q6",
    "category": "Standardization & Systematization",
    "text": "Are you involved in efforts to standardize or systematize how AI is used?",
    "options": [
      {
        "score": 1,
        "text": "I'm not involved.",
        "hint": "e.g., You might have your own way of using AI, but haven't thought about formalizing or sharing it more broadly."
      },
      {
        "score": 2,
        "text": "I've settled on personal patterns for how I use AI.",
        "hint": "e.g., You might have go-to approaches for common tasks such as meeting notes, emails, or document creation—even if they're just for your own use."
      },
      {
        "score": 3,
        "text": "I've helped build shared AI usage frameworks within my team.",
        "hint": "e.g., You might have created a shared team prompt library, task-specific usage guides, or similar resources that your team uses on a regular basis."
      },
      {
        "score": 4,
        "text": "I've standardized AI practices so they can be reused across multiple departments or teams.",
        "hint": "e.g., You might have developed templates or how-to guides organized by task type that other departments or teams can pick up and use directly."
      },
      {
        "score": 5,
        "text": "I've created reusable AI practices that have been adopted beyond my own department and are raising AI capability across the organization.",
        "hint": "e.g., The prompt libraries or usage guides you've systematized might have been adopted by multiple other departments or teams, contributing to a broader lift in AI capability across the organization."
      }
    ]
  },
  {
    "id": "q7",
    "category": "Initiative & Consistency",
    "text": "How do you approach continuous learning and improvement in your own AI use?",
    "options": [
      {
        "score": 1,
        "text": "I haven't taken steps on my own — I act when directed.",
        "hint": "e.g., You might attend training or try things when the company asks, but don't typically seek out AI learning on your own."
      },
      {
        "score": 2,
        "text": "I occasionally look into new tools or techniques, but not consistently.",
        "hint": "e.g., You might try a new AI tool or read an article when something catches your eye, but it hasn't become a regular habit yet."
      },
      {
        "score": 3,
        "text": "I regularly try new AI approaches and apply them to improve my work.",
        "hint": "e.g., You might set aside time on a regular basis to explore AI developments and actively incorporate new methods into your workflow."
      },
      {
        "score": 4,
        "text": "I consistently take action to raise AI capability across my team and organization.",
        "hint": "e.g., You might regularly share the latest AI tools, techniques, or use cases with your team and continuously support broader improvements in AI literacy across the organization."
      },
      {
        "score": 5,
        "text": "I play a leading and proactive role in shaping our organization's AI direction.",
        "hint": "e.g., You might stay on top of AI trends in your industry and continuously make suggestions or take action—from your own position—to improve how AI is used across the organization."
      }
    ]
  },
  {
    "id": "q8",
    "category": "Organizational Value Creation",
    "text": "What actions are you taking to contribute to value creation through AI use?",
    "options": [
      {
        "score": 1,
        "text": "I haven't yet taken actions that connect AI use to organizational outcomes.",
        "hint": "e.g., You might use AI in your work, but it hasn't yet translated into actions that drive meaningful results or value for the organization."
      },
      {
        "score": 2,
        "text": "My AI use is largely limited to improving my own work, and broader impact is still ahead.",
        "hint": "e.g., You might have become more efficient personally, but those gains haven't yet translated into meaningful improvements for your department or the organization overall."
      },
      {
        "score": 3,
        "text": "I contribute to organizational value creation through productivity and quality improvements in my team.",
        "hint": "e.g., Your team's output quality and speed might have improved through AI use, leading to better overall business results."
      },
      {
        "score": 4,
        "text": "I drive broader organizational improvement through AI adoption across multiple departments and teams.",
        "hint": "e.g., By rolling out AI use across departments or teams, cost reductions and quality improvements might have been achieved more broadly, strengthening the organization's overall competitiveness."
      },
      {
        "score": 5,
        "text": "I lead actions that bring new value to the organization through AI.",
        "hint": "e.g., You might be driving fundamental changes to how work gets done through AI—actively contributing to improvements in the organization's overall competitiveness and value creation capability."
      }
    ]
  }
];const SHAREPOINT_SITE = "https://mkiusainc.sharepoint.com/sites/xn--88jzah";
const SHAREPOINT_LIST = "AI_Assessment_Results";

const levels=[
  {min:1.0,max:1.6,key:"Not Used",color:"#888780",bg:"#F1EFE8",desc:"Your AI use is currently limited or not yet active. A great first step is to try incorporating AI tools into a small part of your daily work and see what works for you."},
  {min:1.6,max:2.5,key:"Basic Use",color:"#3B6D11",bg:"#EAF3DE",desc:"You're beginning to use AI in your own work. Consider sharing what you've learned with teammates — even small tips can help raise the team's overall capability."},
  {min:2.5,max:3.5,key:"Practical Use",color:"#185FA5",bg:"#E6F1FB",desc:"AI is part of how your team operates. Keep building on your know-how and sharing it regularly to help lift the organization's overall AI usage level."},
  {min:3.5,max:4.5,key:"Build / Scale-out",color:"#534AB7",bg:"#EEEDFE",desc:"You're driving AI adoption beyond your immediate team. Continue standardizing and scaling your practices to help make organizational AI use self-sustaining."},
  {min:4.5,max:5.1,key:"Transformation Leader",color:"#993C1D",bg:"#FAECE7",desc:"You're at the forefront of AI adoption in the organization. Your leadership in embedding AI into systems and driving value creation is making a lasting impact."},
];
const ratingMap=[
  {min:1.0,max:1.4,label:"1 — Not Meeting Expectations"},
  {min:1.4,max:2.2,label:"2 — Building Performance"},
  {min:2.2,max:3.2,label:"3 — Solid Performance"},
  {min:3.2,max:4.2,label:"4 — Valued Performance"},
  {min:4.2,max:5.1,label:"5 — Leading Performance"},
];
const barColors=["#534AB7","#185FA5","#1D9E75","#D85A30","#BA7517","#E24B4A","#639922","#D4537E"];
let current=0;
const answers={};
function getLevel(avg){return levels.find(l=>avg>=l.min&&avg<l.max)||levels[levels.length-1];}
function getRating(avg){return ratingMap.find(r=>avg>=r.min&&avg<r.max)||ratingMap[ratingMap.length-1];}
function render(){
  const q=questions[current];const d=answers[q.id];
  document.getElementById("quiz-area").innerHTML=`
    <div class="card">
      <div class="card-category">${q.category}</div>
      <div class="card-question">${q.text}</div>
      <div class="options">
        ${q.options.map((o,i)=>`
          <div class="option ${d===i?'selected':''}" onclick="select(${i})">
            <div class="option-score">${o.score}</div>
            <div class="option-body">
              <div class="option-text">${o.text}</div>
              <div class="option-hint">${o.hint}</div>
            </div>
          </div>`).join("")}
      </div>
    </div>`;
  const done=Object.keys(answers).length;
  document.getElementById("progress").style.width=`${done/questions.length*100}%`;
  document.getElementById("progress-label").textContent=`${done} / ${questions.length} completed`;
  document.getElementById("prev-btn").disabled=current===0;
  document.getElementById("next-btn").disabled=answers[q.id]===undefined;
  document.getElementById("next-btn").textContent=current===questions.length-1?"See Results →":"Next →";
}
function select(i){answers[questions[current].id]=i;render();}
function prev(){if(current>0){current--;render();}}
function next(){if(current<questions.length-1){current++;render();}else showResult();}

function showResult(){
  const scores=questions.map(q=>q.options[answers[q.id]].score);
  const avg=scores.reduce((a,b)=>a+b,0)/scores.length;
  const lv=getLevel(avg);const rt=getRating(avg);
  document.getElementById("progress").style.width="100%";
  document.getElementById("progress-label").textContent="8 / 8 completed";
  document.getElementById("prev-btn").style.display="none";
  document.getElementById("next-btn").style.display="none";
  document.getElementById("quiz-area").innerHTML=`
    <div class="result-hero">
      <div class="result-tag">Assessment Results</div>
      <div class="result-badge" style="background:${lv.bg};color:${lv.color}">${lv.key}</div>
      <div class="result-avg">${avg.toFixed(1)}<span style="font-size:18px;font-weight:400;color:rgba(255,255,255,.5)"> / 5.0</span></div>
      <div style="font-size:13px;color:rgba(255,255,255,.55)">Average Score</div>
      <div style="margin-top:1rem;font-size:13px;color:rgba(255,255,255,.75);line-height:1.7;border-top:1px solid rgba(255,255,255,.15);padding-top:1rem">${lv.desc}</div>
    </div>
    <div class="result-body">
      <div class="score-grid">
        <div class="score-card"><div class="score-card-label">Performance Rating</div><div class="score-card-value" style="font-size:13px">${rt.label}</div></div>
        <div class="score-card"><div class="score-card-label">Categories Completed</div><div class="score-card-value">8 / 8</div></div>
      </div>
      <hr class="divider">
      <div class="result-sec-title">Score by Category</div>
      <div class="breakdown">
        ${questions.map((q,i)=>`
          <div class="bar-row">
            <div class="bar-label">${q.category}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${scores[i]/5*100}%;background:${barColors[i]}"></div></div>
            <div class="bar-score">${scores[i]}</div>
          </div>`).join("")}
      </div>
      <hr class="divider">
      <div class="note">These results serve as your <strong>pre-assessment baseline</strong>. At year-end, your evaluation will be measured against this starting point based on your actual behaviors and contributions.</div>
      <div class="submit-block">
        <div class="submit-block-title">📤 Submit Your Results</div>
        <input class="name-input" id="name-input" type="text" placeholder="Enter your full name" />
        <input class="name-input" id="email-input" type="email" placeholder="Enter your email address (a copy will be sent to you)" />
        <div class="submit-note">Enter your name and email, then click Send by Email. Outlook will open with your results pre-filled. A copy will be sent to your inbox.</div>
        <button class="btn mail-btn" id="mail-btn" onclick="sendMail(${avg.toFixed(2)},'${lv.key}','${rt.label}',${JSON.stringify(scores)})">📧 Send by Email</button>
        <div class="success-msg" id="success-msg">✅ Your email has been prepared. Please send it from Outlook.</div>
      </div>
      <button class="btn" onclick="restart()" style="width:100%">← Retake Assessment</button>
    </div>`;
}

async function submitToSharePoint(avg, level, rating, scores){
  const name = document.getElementById("name-input").value.trim();
  const email = document.getElementById("email-input").value.trim();
  if(!name){ alert("Please enter your full name."); return; }
  if(!email){ alert("Please enter your email address."); return; }
  const btn = document.getElementById("submit-btn");
  btn.disabled = true; btn.textContent = "Submitting...";
  try {
    const digestResp = await fetch(`${SHAREPOINT_SITE}/_api/contextinfo`, {
      method: "POST",
      headers: { "Accept": "application/json;odata=verbose" },
      credentials: "include"
    });
    const digestData = await digestResp.json();
    const digest = digestData.d.GetContextWebInformation.FormDigestValue;
    const payload = {
      "__metadata": { "type": "SP.Data.AI_Assessment_ResultsListItem" },
      "Title": name,
      "SubmittedAt": new Date().toISOString(),
      "AverageScore": avg,
      "Level": level,
      "Rating": rating,
      "Language": "English",
      "Email": email,
      "Q1": scores[0],
      "Q2": scores[1],
      "Q3": scores[2],
      "Q4": scores[3],
      "Q5": scores[4],
      "Q6": scores[5],
      "Q7": scores[6],
      "Q8": scores[7],
    };
    const resp = await fetch(`${SHAREPOINT_SITE}/_api/web/lists/getbytitle('${SHAREPOINT_LIST}')/items`, {
      method: "POST",
      headers: {
        "Accept": "application/json;odata=verbose",
        "Content-Type": "application/json;odata=verbose",
        "X-RequestDigest": digest,
      },
      credentials: "include",
      body: JSON.stringify(payload)
    });
    if(resp.ok){
      document.getElementById("success-msg").style.display = "block";
      btn.style.display = "none";
      document.getElementById("mail-btn").style.display = "none";
      document.getElementById("name-input").disabled = true;
      document.getElementById("email-input").disabled = true;
      sendMail(avg, level, rating, scores);
    } else {
      throw new Error("Submission failed");
    }
  } catch(e) {
    btn.disabled = false; btn.textContent = "📊 Submit Results";
    alert("SharePoint submission failed. Please use 'Send by Email' instead.\nError: " + e.message);
  }
}

function sendMail(avg, level, rating, scores){
  const name = document.getElementById("name-input").value.trim();
  const email = document.getElementById("email-input").value.trim();
  if(!name || !email) return;
  const today = new Date().toLocaleDateString("en-US");
  const catNames = ["AI Usage Frequency","Knowledge Capture","Knowledge Sharing","Driving AI Adoption","Business Impact","Standardization & Systematization","Initiative & Consistency","Organizational Value Creation"];
  const catScores = catNames.map((c,i) => `${c}: ${scores[i]}`).join("\n");
  const subject = encodeURIComponent(`AI Impact Pre-Assessment Results — ${name}`);
  const body = encodeURIComponent(
`[AI Impact Pre-Assessment Results]

Name: ${name}
Date: ${today}
Average Score: ${avg}
Level: ${level}
Performance Rating: ${rating}

[Score by Category]
${catScores}
`);
  const cc = encodeURIComponent(email);
  window.location.href = `mailto:ai_assessment@mki-us.com?cc=${cc}&subject=${subject}&body=${body}`;
}

function restart(){Object.keys(answers).forEach(k=>delete answers[k]);current=0;document.getElementById("prev-btn").style.display="";document.getElementById("next-btn").style.display="";render();}
render();
</script>
